# nginx-freebsd.conf
# ================================================================================
# SIBERMAS — Nginx configuration for FreeBSD (Single-Domain, Path-Based API)
# ================================================================================
# Deploy target : /usr/local/etc/nginx/nginx.conf
# App root      : /usr/local/www/apache24/data/Sibermas2026  (default: /usr/local/www/apache24/data/Sibermas2026)
#
# Routing model (single domain, no subdomain split):
#
#   https://sibermas.uinsaizu.ac.id/            → Next.js (port 3000)
#   https://sibermas.uinsaizu.ac.id/_next/…     → Next.js static assets (file serve)
#   https://sibermas.uinsaizu.ac.id/api/*       → Laravel (php-fpm via sock)
#
# Template placeholders (rendered by install-freebsd.sh):
#
#   sibermas.uinsaizu.ac.id  → e.g. sibermas.uinsaizu.ac.id
#   sibermas.uinsaizu.ac.id   → e.g. sibermas.uinsaizu.ac.id
#                     (the `live/<base>/fullchain.pem` directory name)
#   /usr/local/www/apache24/data/Sibermas2026     → e.g. /usr/local/www/apache24/data/Sibermas2026
#                     (root path aplikasi di server FreeBSD)
#
# IMPORTANT: Blok `/api` DIWAJIBKAN memakai pattern `alias + named location`
# (location @api). Pattern ini mencegah request API "bocor" ke Next.js
# ketika file tidak ditemukan — try_files jatuh ke @api yang rewrite ke
# /api/index.php, BUKAN ke `location /` (proxy_pass Next.js) yang akan
# balas HTML dan bikin frontend crash saat JSON.parse.
# ================================================================================

user www;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # --- Rate-limit zones -----------------------------------------------------
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=60r/s;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # --------------------------------------------------------------------------
    # HTTP (port 80) — primary serving selama SSL belum siap.
    # Setelah certbot aktif, isi block ini diganti:
    #   return 301 https://$host$request_uri;
    # dan konten dipindah ke server 443 ssl http2 (template di bawah).
    # --------------------------------------------------------------------------
    server {
        listen 80 default_server;
        server_name sibermas.uinsaizu.ac.id;

        # --- Security headers (re-asserted at edge) -------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

        # --- Next.js static files (dilayani nginx langsung, bypass Node) ----
        location /_next/static/ {
            alias /usr/local/www/apache24/data/Sibermas2026/apps/web/.next/standalone/apps/web/.next/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # --- Next.js public assets (hasil copy dari apps/web/public) --------
        location /images/ {
            alias /usr/local/www/apache24/data/Sibermas2026/apps/web/.next/standalone/apps/web/public/images/;
            expires 7d;
        }

        location = /favicon.ico {
            alias /usr/local/www/apache24/data/Sibermas2026/apps/web/.next/standalone/apps/web/public/favicon.ico;
            access_log off;
        }
        location = /robots.txt {
            alias /usr/local/www/apache24/data/Sibermas2026/apps/web/.next/standalone/apps/web/public/robots.txt;
            access_log off;
        }

        # --- Laravel API — alias + named location (CRITICAL) ---------------
        # Pattern ini wajib: dengan `alias`, nginx strip prefix `/api/` lalu
        # cari file di document root Laravel. Kalau tidak ketemu, try_files
        # jatuh ke @api (named location) yang rewrite ke `/api/index.php`.
        # Tanpa @api, fallback akan nyasar ke `location /` (Next.js) dan
        # response-nya HTML 404 Next.js → frontend crash.
        location /api {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            alias /usr/local/www/apache24/data/Sibermas2026/apps/api/public;
            try_files $uri $uri/ @api;

            # PHP handler — hanya match file `.php` di dalam /api namespace.
            # SCRIPT_FILENAME pakai $request_filename karena alias butuh
            # resolusi runtime (bukan $document_root$fastcgi_script_name).
            location ~ \.php$ {
                fastcgi_pass unix:/var/run/php-fpm.sock;
                fastcgi_param SCRIPT_FILENAME $request_filename;
                include /usr/local/etc/nginx/fastcgi_params;
                fastcgi_read_timeout 300;
                fastcgi_buffers 16 16k;
                fastcgi_buffer_size 32k;
            }
        }

        # --- @api fallback: rewrite semua path tak-ditemukan → index.php ---
        # Laravel router yang akan menangani dispatch di `REQUEST_URI`.
        location @api {
            rewrite ^/api/(.*)$ /api/index.php last;
        }

        # --- Next.js — catch-all (WAJIB setelah /api supaya tidak bentrok) -
        location / {
            limit_conn conn_limit 50;
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Security: blokir akses ke dotfile (kecuali .well-known untuk certbot)
        location ~ /\.(?!well-known).* {
            deny all;
        }

        access_log /var/log/nginx/sibermas-access.log main;
        error_log  /var/log/nginx/sibermas-error.log;
    }

    # --------------------------------------------------------------------------
    # HTTPS (port 443) — AKTIFKAN SETELAH CERTBOT.
    # Langkah aktifasi:
    #   1. certbot certonly --webroot \
    #        -w /usr/local/www/apache24/data/Sibermas2026/apps/api/public \
    #        -d sibermas.uinsaizu.ac.id --cert-name sibermas.uinsaizu.ac.id \
    #        -m admin@uinsaizu.ac.id --agree-tos -n
    #   2. Uncomment block di bawah.
    #   3. Ganti isi server port 80 di atas menjadi:
    #        return 301 https://$host$request_uri;
    #   4. Update .env: sudah HTTPS (lihat .env.production.example), set
    #      SESSION_SECURE_COOKIE=true.
    #   5. service nginx reload
    # --------------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name sibermas.uinsaizu.ac.id;
    #
    #     ssl_certificate     /usr/local/etc/letsencrypt/live/sibermas.uinsaizu.ac.id/fullchain.pem;
    #     ssl_certificate_key /usr/local/etc/letsencrypt/live/sibermas.uinsaizu.ac.id/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_stapling        on;
    #     ssl_stapling_verify on;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # ... (copy seluruh isi location blocks dari server port 80 di atas)
    # }
}
