services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kkn-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    networks:
      - kkn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: kkn-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8082}:80"
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - kkn-network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: kkn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-kkn}
      POSTGRES_USER: ${DB_USERNAME:-kkn_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kkn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-kkn_user}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kkn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secret}
    ports:
      - "6391:6379"
    volumes:
      - redis-data:/data
    networks:
      - kkn-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kkn-queue
    restart: unless-stopped
    command: php artisan queue:work redis --queue=high,default,low --tries=3 --timeout=120
    volumes:
      - ./:/var/www
      - /var/www/vendor
    networks:
      - kkn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  kkn-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
