name: Enforce docs/changes for critical code

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  docs-check:
    name: Docs changes enforcement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify docs/changes presence for critical code changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          echo "Base sha: $BASE_SHA"
          git fetch origin $BASE_SHA || true
          CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD || true)
          echo "Changed files:\n$CHANGED"

          # Define critical paths regex (adjust as needed)
          CRITICAL_REGEX='^(app/|routes/|resources/js/Pages/|app/Services/|app/Http/Controllers/|database/migrations/|config/|public/|resources/views/|app/Models/)'

          if echo "$CHANGED" | grep -E "$CRITICAL_REGEX" >/dev/null 2>&1; then
            echo "Critical code changes detected. Ensuring docs update exists..."
            if echo "$CHANGED" | grep -E '^(docs/changes/|docs/flows/|docs/)' >/dev/null 2>&1; then
              echo "Documentation change found in docs/. OK."
            else
              echo "\nERROR: This PR modifies critical code paths but does not include a corresponding docs/ entry under /docs (e.g., docs/changes/...).\n"
              echo "Please add documentation under /docs/changes following docs/templates/change-template.md or update relevant docs/ files.\n"
              exit 1
            fi
          else
            echo "No critical code changes detected. Docs update not required."
          fi
