name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Type check
        run: pnpm run type-check
      - name: Build
        run: pnpm run build
      - name: Run tests
        run: pnpm run test
      - name: Security audit (pnpm)
        run: pnpm audit --audit-level=high

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kkn_test
          POSTGRES_USER: kkn_test
          POSTGRES_PASSWORD: kkn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup PHP
        uses: shivammathur/setup-php@9e72090525849c5e82e596468b86eb55e9cc5401 # v2.32.0
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, mbstring, xml, curl, zip, gd, pcntl
          coverage: none
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Copy .env
        run: cp .env.example .env
      - name: Set test env vars
        run: |
          echo "APP_KEY=" >> .env
          echo "DB_DATABASE=kkn_test" >> .env
          echo "DB_USERNAME=kkn_test" >> .env
          echo "DB_PASSWORD=kkn_test" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "MAIL_MAILER=array" >> .env
      - name: Generate app key
        run: php artisan key:generate
      - name: Run migrations
        run: php artisan migrate --force
      - name: Run Pest tests
        run: php artisan test --no-coverage
      - name: Run PHPStan
        run: composer stan
      - name: Run Pint (lint)
        run: ./vendor/bin/pint --test
      - name: Security audit (Composer)
        run: composer audit
