# Public reverse-proxy vhost template.
# Deploy target on gateway: /usr/local/etc/nginx/vhosts/__WEB_DOMAIN__.conf
#
# Template placeholders (render with sed before deploying):
#   __BACKEND_IP__  -> app server IP (e.g. 172.16.2.70)
#   __BACKEND_PORT__-> app server port (e.g. 80)
#   __WEB_DOMAIN__  -> public domain (e.g. sibermas.uinsaizu.ac.id)
#   __CERT_BASE__   -> cert directory name (usually same as __WEB_DOMAIN__)
#
# SSL certificates: requires Let's Encrypt or equivalent at:
#   /usr/local/etc/letsencrypt/live/__CERT_BASE__/fullchain.pem
#   /usr/local/etc/letsencrypt/live/__CERT_BASE__/privkey.pem
#   /usr/local/etc/letsencrypt/options-ssl-nginx.conf
#   /usr/local/etc/letsencrypt/ssl-dhparams.pem
#
# If cert files don't exist yet, comment out the ssl_* lines and listen 443
# block, then run certbot first.

upstream backend_sibermas {
    server __BACKEND_IP__:__BACKEND_PORT__ max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name __WEB_DOMAIN__;

    location ^~ /.well-known/acme-challenge/ {
        proxy_pass http://backend_sibermas;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen [::]:443 ssl;
    listen 443 ssl;
    http2 on;
    server_name __WEB_DOMAIN__;

    if ($bad_ua) { return 444; }
    if ($bad_method) { return 444; }
    if ($bad_query) { return 403; }
    if ($http_user_agent ~* "libredtail-http") { return 403; }
    if ($request_method !~ ^(GET|POST|HEAD|OPTIONS)$) { return 444; }

    location ~* "(?:/etc/passwd)" { deny all; }
    location ~ (\.\./|\%2e) { return 403; }
    location /cgi-bin { deny all; }

    location = /api/notifications/stream {
        proxy_pass http://backend_sibermas;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 75s;
        proxy_send_timeout 30s;
    }

    location = /api {
        proxy_pass http://backend_sibermas;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_redirect off;
        proxy_socket_keepalive on;
    }

    location ^~ /api/ {
        proxy_pass http://backend_sibermas;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffers 32 32k;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_socket_keepalive on;
    }

    location / {
        proxy_pass http://backend_sibermas;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_buffers 32 32k;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_socket_keepalive on;
    }

    ssl_certificate /usr/local/etc/letsencrypt/live/__CERT_BASE__/fullchain.pem;
    ssl_certificate_key /usr/local/etc/letsencrypt/live/__CERT_BASE__/privkey.pem;
    include /usr/local/etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /usr/local/etc/letsencrypt/ssl-dhparams.pem;
}
