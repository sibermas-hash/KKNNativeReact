                  success: true
                  message: 'CAPTCHA berhasil dibuat.'
                  data:
                    captcha_id: f491a3c0-f15a-4691-8925-5055f72e7c7d
                    question: 'Berapa hasil 9 + 15?'
                    expires_at: '2026-05-06T12:47:33+07:00'
