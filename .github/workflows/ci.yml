name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend (Web + Packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: CI guard
        run: pnpm run ci:guard

      - name: Type check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: /api/v1

      - name: Run tests
        run: pnpm run test

      - name: Security audit
        run: pnpm audit --audit-level=critical

  backend:
    name: Backend (Laravel API)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kkn_test
          POSTGRES_USER: kkn_test
          POSTGRES_PASSWORD: kkn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, mbstring, xml, curl, zip, gd, pcntl, intl, bcmath, sodium
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: kkn_test
          DB_USERNAME: kkn_test
          DB_PASSWORD: kkn_test

      - name: Set test env vars
        run: |
          echo "DB_DATABASE=kkn_test" >> .env
          echo "DB_USERNAME=kkn_test" >> .env
          echo "DB_PASSWORD=kkn_test" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "MAIL_MAILER=array" >> .env
          echo "AUTH_TEST_AUTO_LOGIN_ENABLED=false" >> .env
          echo "APP_BLIND_INDEX_KEY=base64:dGVzdGluZ2tleWZvcmNpcGlwZWxpbmVydW4xMjM0NTY=" >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Pest tests
        run: php artisan test --no-coverage

      - name: Run PHPStan
        run: composer stan

      - name: Run Pint (code style)
        run: ./vendor/bin/pint --test

      - name: Security audit (Composer)
        run: composer audit

  deploy-single:
    name: Deploy to FreeBSD (Single Server)
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_MODE != 'jails'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd /usr/local/www/apache24/data/Sibermas2026
            git pull origin main

            # Backend
            cd apps/api
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan event:cache

            # Frontend
            cd /usr/local/www/apache24/data/Sibermas2026
            pnpm install --frozen-lockfile
            pnpm build
            cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
            cp -r apps/web/public apps/web/.next/standalone/apps/web/public
            chown -R www:www apps/web/.next apps/api/storage apps/api/bootstrap/cache

            # Restart services
            supervisorctl restart workers:*

            # Health check
            sleep 5
            curl -sf http://127.0.0.1:8000/api/health || echo "WARNING: API health check failed"
            curl -sf http://127.0.0.1:3000 || echo "WARNING: Web health check failed"

  deploy-jails:
    name: Deploy to FreeBSD (Jails Mode)
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_MODE == 'jails'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH ke host
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            RELEASE_DIR="/usr/local/www/sibermas/releases/$(date +%Y%m%d_%H%M%S)"
            CURRENT_LINK="/usr/local/www/sibermas/current"

            # Clone code
            git clone --depth=1 https://github.com/anomalyco/kknuinsaizu.git "$RELEASE_DIR"

            # Backend build (di host)
            cd "$RELEASE_DIR/apps/api"
            composer install --no-dev --optimize-autoloader --no-interaction
            cp .env.production.jail .env
            php artisan key:generate --force
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan event:cache

            # Frontend build (di host)
            cd "$RELEASE_DIR"
            pnpm install --frozen-lockfile
            pnpm build
            cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
            cp -r apps/web/public apps/web/.next/standalone/apps/web/public
            chown -R www:www apps/web/.next apps/api/storage apps/api/bootstrap/cache

            # Switch symlink
            ln -sfn "$RELEASE_DIR" "${CURRENT_LINK}.new"
            rm -f "$CURRENT_LINK" && mv "${CURRENT_LINK}.new" "$CURRENT_LINK"

            # Restart services di setiap jail
            # Opsi: jexec (default) atau SSH (set JAIL_USE_SSH=true)
            if [ "${JAIL_USE_SSH:-false}" = "true" ]; then
              ssh 10.0.0.12 supervisorctl restart workers:*
              ssh 10.0.0.12 service nginx reload
              ssh 10.0.0.11 supervisorctl restart sibermas-web
              ssh 10.0.0.10 service nginx reload
            else
              jexec api supervisorctl restart workers:* 2>/dev/null || true
              jexec api service nginx reload 2>/dev/null || true
              jexec web supervisorctl restart sibermas-web 2>/dev/null || true
              jexec nginx-proxy service nginx reload 2>/dev/null || true
            fi

            # Health check via nginx-proxy
            sleep 5
            curl -sf https://sibermas.uinsaizu.ac.id/api/health || echo "WARNING: API health check failed"
            curl -sf https://sibermas.uinsaizu.ac.id/ || echo "WARNING: Web health check failed"
