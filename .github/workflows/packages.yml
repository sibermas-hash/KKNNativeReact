name: Shared Packages Build

on:
  push:
    branches: [main, develop]
    paths: ['packages/**']
  pull_request:
    branches: [main, develop]
    paths: ['packages/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check shared-types
        run: pnpm --filter @sibermas/shared-types exec tsc --noEmit

      - name: Type check constants
        run: pnpm --filter @sibermas/constants exec tsc --noEmit

      - name: Type check schemas
        run: pnpm --filter @sibermas/schemas exec tsc --noEmit

      - name: Type check api-client
        run: pnpm --filter @sibermas/api-client exec tsc --noEmit --skipLibCheck

      - name: Type check hooks
        run: pnpm --filter @sibermas/hooks exec tsc --noEmit --skipLibCheck
