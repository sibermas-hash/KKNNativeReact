# nginx-freebsd.conf
# Nginx configuration for SIBERMAS on FreeBSD.
# Copy/render to: /usr/local/etc/nginx/nginx.conf
#
# DO NOT USE THIS FILE AS-IS. It contains TEMPLATE placeholders that must be
# substituted before deployment:
#
#   __WEB_DOMAIN__  → e.g. sibermas.uinsaizu.ac.id
#   __API_DOMAIN__  → e.g. api.sibermas.uinsaizu.ac.id
#   __CERT_BASE__   → e.g. sibermas.uinsaizu.ac.id
#                     (the `live/<base>/fullchain.pem` dir name)
#
# install-freebsd.sh automates substitution when WEB_DOMAIN, API_DOMAIN, and
# CERT_BASE env vars are set before running. Otherwise the sed replacement is
# the operator's responsibility and the server will NOT start until done.
#
# Audit finding C-006.
#
# Paths (FreeBSD):
#   Web root  : /usr/local/www/sibermas
#   PHP-FPM   : /var/run/php84-fpm.sock  (or 127.0.0.1:9000)
#   SSL certs : /usr/local/etc/letsencrypt/live/<domain>/
#   Logs      : /var/log/nginx/

user www;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # --- C-006: Rate-limit zones (missing before) -----------------------------
    # 10m of state = ~160k tracked IPs. Rates are intentionally loose for the
    # broad `api_limit` bucket and tight for `auth_limit` (brute-force guard).
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=60r/s;
    limit_req_zone  $binary_remote_addr  zone=auth_limit:10m  rate=5r/m;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # -------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name __WEB_DOMAIN__ __API_DOMAIN__;
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS — Next.js Web Frontend (proxy ke Node.js port 3000)
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name __WEB_DOMAIN__;

        # SSL — Let's Encrypt via security/py-certbot
        ssl_certificate     /usr/local/etc/letsencrypt/live/__CERT_BASE__/fullchain.pem;
        ssl_certificate_key /usr/local/etc/letsencrypt/live/__CERT_BASE__/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # R13-OPS-014: restrict powerful browser features; the Next.js config
        # emits the same header per-route but we also enforce at the nginx
        # layer as defense-in-depth. Geolocation is allowed for same-origin
        # because the student GPS check-in uses it.
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

        # Next.js static files (dari standalone build)
        location /_next/static/ {
            alias /usr/local/www/sibermas/apps/web/.next/standalone/apps/web/.next/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Public assets
        location /public/ {
            alias /usr/local/www/sibermas/apps/web/public/;
            expires 7d;
        }

        # Proxy semua request ke Next.js
        location / {
            limit_conn conn_limit 50;
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        access_log /var/log/nginx/sibermas-web-access.log main;
        error_log  /var/log/nginx/sibermas-web-error.log;
    }

    # -------------------------------------------------------------------------
    # HTTPS — Laravel API (subdomain api.)
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name __API_DOMAIN__;

        root /usr/local/www/sibermas/apps/api/public;
        index index.php;

        ssl_certificate     /usr/local/etc/letsencrypt/live/__CERT_BASE__/fullchain.pem;
        ssl_certificate_key /usr/local/etc/letsencrypt/live/__CERT_BASE__/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Strict rate limits on auth endpoints (brute-force guard).
        location ~ ^/api/v1/auth/(login|forgot-password|reset-password)$ {
            limit_req zone=auth_limit burst=3 nodelay;
            try_files $uri /index.php?$query_string;
        }

        # Broader rate limit for the rest of the API surface.
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;
            try_files $uri /index.php?$query_string;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php84-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include /usr/local/etc/nginx/fastcgi_params;
            fastcgi_read_timeout 300;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        access_log /var/log/nginx/sibermas-api-access.log main;
        error_log  /var/log/nginx/sibermas-api-error.log;
    }
}
