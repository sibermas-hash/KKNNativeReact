# SIBERMAS Nginx frontend for FreeBSD.
#
# Deploy target:
#   /usr/local/etc/nginx/nginx.conf
#
# Routing model:
#   /api/*       -> Apache24 backend on 127.0.0.1:8080
#   /            -> Next.js standalone on 127.0.0.1:3000
#   /_next/*     -> static files served directly by Nginx

user www;
worker_processes auto;
worker_rlimit_nofile 65536;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use kqueue;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;
    reset_timedout_connection on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 3;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=60r/s;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    map $http_x_forwarded_port $forwarded_port {
        default $http_x_forwarded_port;
        ''      $server_port;
    }

    upstream sibermas_api {
        server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream sibermas_web {
        server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    server {
        listen 80 default_server;
        server_name __WEB_DOMAIN__;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

        location ^~ /.well-known/acme-challenge/ {
            root __APP_DIR__/apps/api/public;
            default_type text/plain;
            allow all;
        }

        # Server-Sent Events: keep proxy buffering off so notifications arrive
        # without waiting for the 60s stream to close.
        location = /api/notifications/stream {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://sibermas_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 75s;
            proxy_send_timeout 30s;
        }

        location = /api {
            proxy_pass http://sibermas_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_redirect off;
        }

        # Preserve the /api prefix. Laravel's API routes are registered under
        # /api, and Apache's DocumentRoot is apps/api/public.
        location ^~ /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;
            proxy_pass http://sibermas_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_read_timeout 300s;
            proxy_send_timeout 60s;
            proxy_redirect off;
        }

        location /_next/static/ {
            alias __APP_DIR__/apps/web/.next/standalone/apps/web/.next/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        location /images/ {
            alias __APP_DIR__/apps/web/.next/standalone/apps/web/public/images/;
            expires 7d;
        }

        location = /favicon.ico {
            alias __APP_DIR__/apps/web/.next/standalone/apps/web/public/favicon.ico;
            access_log off;
        }

        location = /robots.txt {
            alias __APP_DIR__/apps/web/.next/standalone/apps/web/public/robots.txt;
            access_log off;
        }

        location / {
            limit_conn conn_limit 50;
            proxy_pass http://sibermas_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }

        access_log /var/log/nginx/sibermas-access.log main;
        error_log  /var/log/nginx/sibermas-error.log;
    }

    # HTTPS enablement:
    # 1. Issue certificate with certbot webroot:
    #      certbot certonly --webroot -w __APP_DIR__/apps/api/public \
    #        -d __WEB_DOMAIN__ --cert-name __CERT_BASE__
    # 2. Copy the location blocks above into a 443 server block and turn this
    #    port-80 block into a redirect:
    #      return 301 https://$host$request_uri;
}
