# SIBERMAS — FreeBSD sysctl tuning (5000 concurrent users)
# Deploy: /etc/sysctl.conf (host + semua jail)
# Apply: sysctl -f /etc/sysctl.conf

# ── File descriptors ────────────────────────────────
kern.maxfiles=131072
kern.maxfilesperproc=65536

# ── Network buffers ─────────────────────────────────
net.inet.tcp.sendbuf_max=2097152
net.inet.tcp.recvbuf_max=2097152
net.inet.tcp.sendbuf_auto=1
net.inet.tcp.recvbuf_auto=1
net.inet.tcp.sendbuf_inc=16384
net.inet.tcp.recvbuf_inc=524288

# ── TCP tuning ──────────────────────────────────────
net.inet.tcp.fastopen=3
net.inet.tcp.syncache.rexmtlimit=3
net.inet.tcp.syncache.count=2048
net.inet.tcp.syncache.hashsize=1024
net.inet.tcp.tcbhashsize=16384
net.inet.tcp.maxtcptw=4096
net.inet.tcp.nolocaltimewait=1

# ── Ephemeral ports ─────────────────────────────────
net.inet.ip.portrange.first=1024
net.inet.ip.portrange.last=65535

# ── Shared memory (PostgreSQL) ──────────────────────
kern.ipc.shmmax=17179869184     # 16GB
kern.ipc.shmall=4194304
kern.ipc.shm_use_phys=1

# ── Sendfile ────────────────────────────────────────
net.inet.tcp.sendspace=65536
net.inet.tcp.recvspace=65536

# ── Accept filter ───────────────────────────────────
net.inet.tcp.acceptfilter=1

# ── mbuf cluster limit ──────────────────────────────
kern.ipc.nmbclusters=262144
kern.ipc.nmbjumbop=262144
kern.ipc.nmbjumbo9=0
kern.ipc.nmbjumbo16=0
