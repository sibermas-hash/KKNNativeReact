name: React Native Type Check

on:
  push:
    branches: [main]
    paths: ['apps/mobile/**', 'packages/**']
  pull_request:
    branches: [main]
    paths: ['apps/mobile/**', 'packages/**']
  workflow_dispatch:

# APK/IPA builds use EAS Build (Expo Application Services)
# Run manually: cd apps/mobile && npx eas build --platform android

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter mobile exec tsc --noEmit --skipLibCheck
