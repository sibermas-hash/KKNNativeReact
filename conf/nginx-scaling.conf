# SIBERMAS — Nginx config (5000 concurrent users)
# Deploy: /usr/local/etc/nginx/nginx.conf (nginx-proxy jail)
# Target: 8192 connections, upstream keepalive, Next.js cluster

user www;
worker_processes auto;
worker_rlimit_nofile 65536;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use kqueue;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 120;
    keepalive_requests 1000;
    client_max_body_size 50M;
    reset_timedout_connection on;

    # Upstream clusters
    upstream web_cluster {
        least_conn;
        server 10.0.0.11:3000 max_fails=3 fail_timeout=10s;
        server 10.0.0.11:3001 max_fails=3 fail_timeout=10s;
        server 10.0.0.11:3002 max_fails=3 fail_timeout=10s;
        server 10.0.0.11:3003 max_fails=3 fail_timeout=10s;
        keepalive 128;
    }

    upstream api_cluster {
        server 10.0.0.12:8080 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    # Rate-limit
    limit_req_zone  $binary_remote_addr  zone=api_limit:100m  rate=120r/s;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:100m;

    # Proxy
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    proxy_buffer_size   8k;
    proxy_buffers       64 8k;
    proxy_busy_buffers_size 16k;
    proxy_temp_file_write_size 64k;

    proxy_connect_timeout 10s;
    proxy_read_timeout   60s;
    proxy_send_timeout   10s;

    # FastCGI (internal api jail)
    fastcgi_buffer_size 32k;
    fastcgi_buffers     64 8k;
    fastcgi_busy_buffers_size 16k;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 3;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml application/octet-stream;

    # SSL
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 4h;
    ssl_buffer_size 1400;

    server {
        listen 80 default_server;
        server_name sibermas.uinsaizu.ac.id;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name sibermas.uinsaizu.ac.id;

        ssl_certificate     /usr/local/etc/letsencrypt/live/sibermas.uinsaizu.ac.id/fullchain.pem;
        ssl_certificate_key /usr/local/etc/letsencrypt/live/sibermas.uinsaizu.ac.id/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /usr/local/etc/letsencrypt/live/sibermas.uinsaizu.ac.id/chain.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        # API → api jail cluster
        location = /api/notifications/stream {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 75s;
            proxy_send_timeout 30s;
        }

        location ^~ /api/ {
            limit_req zone=api_limit burst=100 nodelay;
            limit_conn conn_limit 50;

            # No trailing slash: preserve /api prefix for Laravel routes.
            proxy_pass http://api_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api;

            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # API storage
        location /storage/ {
            proxy_pass http://api_cluster;
            proxy_set_header Host $host;
            expires 30d;
        }

        # Next.js static — bypass Node.js
        location /_next/static/ {
            proxy_pass http://web_cluster;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /images/ {
            proxy_pass http://web_cluster;
            expires 7d;
        }

        location = /favicon.ico {
            proxy_pass http://web_cluster;
            access_log off;
        }

        location = /robots.txt {
            proxy_pass http://web_cluster;
            access_log off;
        }

        # Everything else → Next.js cluster
        location / {
            limit_conn conn_limit 100;
            proxy_pass http://web_cluster;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            proxy_next_upstream error timeout invalid_header http_500 http_502;
            proxy_next_upstream_tries 2;
        }

        access_log /var/log/nginx/sibermas-access.log main;
        error_log  /var/log/nginx/sibermas-error.log;
    }
}
