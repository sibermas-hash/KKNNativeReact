openapi: 3.0.3
info:
  title: KknUinsaizu API (skeleton)
  version: "1.0.0"
  description: "Minimal OpenAPI contract for web + mobile integration. Add/extend paths and schemas to match real API."
servers:
  - url: https://api.example.com
  - url: http://localhost:8000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/v1/auth/login:
    post:
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/todos:
    get:
      summary: List todos
      responses:
        '200':
          description: array of todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'
    post:
      summary: Create todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
  /api/v1/todos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get a todo
      responses:
        '200':
          description: single todo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update a todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
    delete:
      summary: Delete a todo
      responses:
        '204':
          description: Deleted
  /api/v1/inbox:
    get:
      summary: List inbox entries for authenticated user
      responses:
        '200':
          description: array of inbox entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InboxEntry'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Todo:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, done, blocked]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TodoInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, done, blocked]
    InboxEntry:
      type: object
      properties:
        id:
          type: string
        recipient_session_id:
          type: string
        sender_id:
          type: string
        sender_name:
          type: string
        summary:
          type: string
        content:
          type: string
        unread:
          type: integer
        sent_at:
          type: integer
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas_extra:
    Error:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer
security:
  - bearerAuth: []

# Notes:
# - Extend this file with actual endpoints and schemas.
# - Consider auto-generating from controllers or from real API with annotations.
