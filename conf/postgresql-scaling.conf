# SIBERMAS — PostgreSQL config (5000 concurrent users)
# Deploy: /var/db/postgres/data18/postgresql.conf
# Target: data-services jail, 32GB RAM, 8 core, NVMe SSD

# ── Connections ─────────────────────────────────────
max_connections = 300
superuser_reserved_connections = 10

# ── Memory ──────────────────────────────────────────
shared_buffers = 8GB
effective_cache_size = 24GB
work_mem = 32MB
maintenance_work_mem = 1GB
wal_buffers = 64MB
huge_pages = try

# ── Checkpoint ──────────────────────────────────────
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB
wal_compression = zstd

# ── Parallel queries ────────────────────────────────
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
parallel_tuple_cost = 0.01
parallel_setup_cost = 100
# NOTE: `force_parallel_mode` di-rename jadi `debug_parallel_query`
# sejak PG 16. Default `off` sudah cukup — tidak perlu di-set explicit
# di PG 18. Dihapus agar PG 18 startup tidak warning.

# ── Planner (NVMe SSD) ──────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200

# ── Autovacuum ──────────────────────────────────────
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.01
autovacuum_analyze_scale_factor = 0.005
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_cost_delay = 2
autovacuum_vacuum_cost_limit = 1000

# ── Logging ─────────────────────────────────────────
log_destination = stderr
logging_collector = on
log_directory = /var/log/postgresql
log_filename = postgresql-%Y-%m-%d.log
log_min_duration_statement = 500
log_autovacuum_min_duration = 60
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# ── SSL ─────────────────────────────────────────────
ssl = off
password_encryption = scram-sha-256

# ── Timezone ────────────────────────────────────────
timezone = Asia/Jakarta
lc_messages = en_US.UTF-8
lc_monetary = id_ID.UTF-8
lc_numeric = id_ID.UTF-8
lc_time = id_ID.UTF-8
