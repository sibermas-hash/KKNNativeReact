; SIBERMAS — PgBouncer connection pooler (data-services jail)
; Deploy: /usr/local/etc/pgbouncer.ini
; Wajib untuk 5000 user — mencegah PostgreSQL kehabisan koneksi

[databases]
kkn_production = host=127.0.0.1 port=5432 dbname=kkn_production

[pgbouncer]
listen_addr = 10.0.0.13
listen_port = 6432
auth_type = md5
auth_file = /usr/local/etc/pgbouncer/userlist.txt

; Pool
default_pool_size = 100
max_client_conn = 500
max_db_connections = 150
reserve_pool_size = 20
reserve_pool_timeout = 3

; Timeouts
server_idle_timeout = 300
client_idle_timeout = 600
query_timeout = 60
query_wait_timeout = 30

; Tuning
pkt_buf = 4096
max_packet_size = 67108864
listen_backlog = 1024

; Logging
logfile = /var/log/pgbouncer.log
pidfile = /var/run/pgbouncer.pid
stats_period = 60
verbose = 0
