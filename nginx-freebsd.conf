# nginx-freebsd.conf
# Nginx configuration for KKN UIN SAIZU on FreeBSD
# Copy to: /usr/local/etc/nginx/nginx.conf
#
# Paths (FreeBSD):
#   Web root  : /usr/local/www/sibermas
#   PHP-FPM   : /var/run/php84-fpm.sock  (or 127.0.0.1:9000)
#   SSL certs : /usr/local/etc/letsencrypt/live/<domain>/
#   Logs      : /var/log/nginx/

user www;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # -------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS — Next.js Web Frontend (proxy ke Node.js port 3000)
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;

        # SSL — Let's Encrypt via security/py-certbot
        ssl_certificate     /usr/local/etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /usr/local/etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Next.js static files (dari standalone build)
        location /_next/static/ {
            alias /usr/local/www/sibermas/apps/web/.next/standalone/apps/web/.next/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Public assets
        location /public/ {
            alias /usr/local/www/sibermas/apps/web/public/;
            expires 7d;
        }

        # Proxy semua request ke Next.js
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        access_log /var/log/nginx/sibermas-web-access.log main;
        error_log  /var/log/nginx/sibermas-web-error.log;
    }

    # -------------------------------------------------------------------------
    # HTTPS — Laravel API (subdomain api.)
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name api.yourdomain.com;

        root /usr/local/www/sibermas/apps/api/public;
        index index.php;

        ssl_certificate     /usr/local/etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /usr/local/etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php84-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include /usr/local/etc/nginx/fastcgi_params;
            fastcgi_read_timeout 300;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        access_log /var/log/nginx/sibermas-api-access.log main;
        error_log  /var/log/nginx/sibermas-api-error.log;
    }
}
