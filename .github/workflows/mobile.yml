name: React Native Type Check

on:
  push:
    branches: [main]
    paths: ['apps/mobile/**', 'packages/**']
  pull_request:
    branches: [main]
    paths: ['apps/mobile/**', 'packages/**']
  workflow_dispatch:

# APK/IPA builds use EAS Build (Expo Application Services)
# Run manually: cd apps/mobile && npx eas build --platform android

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter mobile exec tsc --noEmit --skipLibCheck
