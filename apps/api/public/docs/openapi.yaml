      operationId: pOSTapiv1authloginAuthenticateUserDetectsPlatformViaXAppTypeHeader
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                  description: 'value seharusnya tidak lebih dari 255 karakter.'
                  example: b
                password:
                  type: string
                  description: ''
                  example: '|]|{+-'
                captcha_id:
                  type: string
                  description: ''
                  example: architecto
                captcha_answer:
                  type: string
                  description: 'value seharusnya tidak lebih dari 10 karakter.'
                  example: ngzmiy
                remember:
                  type: boolean
                  description: ''
                  example: false
                  nullable: true
              required:
                - login
                - password
                - captcha_id
                - captcha_answer
