# nginx-freebsd.conf
# ================================================================================
# SIBERMAS — Nginx configuration for FreeBSD (Single-Domain, Path-Based API)
# ================================================================================
# Deploy target : /usr/local/etc/nginx/nginx.conf
# App root      : /usr/local/www/apache24/data/Sibermas2026
#
# Routing model (single domain, no subdomain split):
#
#   https://sibermas.uinsaizu.ac.id/            → Next.js (port 3000)
#   https://sibermas.uinsaizu.ac.id/_next/…     → Next.js static assets (file serve)
#   https://sibermas.uinsaizu.ac.id/api/*       → Laravel (php-fpm via sock)
#
# Template placeholders (rendered by install-freebsd.sh):
#
#   sibermas.uinsaizu.ac.id  → e.g. sibermas.uinsaizu.ac.id
#   sibermas.uinsaizu.ac.id   → e.g. sibermas.uinsaizu.ac.id
#                     (the `live/<base>/fullchain.pem` directory name)
#
# Default fallback = sibermas.uinsaizu.ac.id when env vars not set.
#
# Starts in HTTP-only mode (port 80) so initial deploy can be validated
# before certbot finishes. Uncomment the HTTPS block + enable the redirect
# in the port-80 server once Let's Encrypt certs are issued.
# ================================================================================

user www;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /usr/local/etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # --- Rate-limit zones -----------------------------------------------------
    # 10m of state ≈ 160k tracked IPs. Rates: broad api bucket loose,
    # auth bucket tight (brute-force guard).
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=60r/s;
    limit_req_zone  $binary_remote_addr  zone=auth_limit:10m  rate=5r/m;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # --------------------------------------------------------------------------
    # HTTP (port 80) — primary serving selama SSL belum siap.
    # Setelah certbot aktif, konten di bawah dipindah ke server 443,
    # dan block ini diganti dengan redirect 301 ke https.
    # --------------------------------------------------------------------------
    server {
        listen 80 default_server;
        server_name sibermas.uinsaizu.ac.id;

        # Setelah SSL aktif, hapus seluruh isi server 80 ini dan ganti dengan:
        #   return 301 https://$host$request_uri;

        # Laravel (php-fpm) sebagai "document root" — diperlukan supaya
        # location ~ \.php$ dapat me-resolve SCRIPT_FILENAME dengan benar saat
        # try_files meng-forward ke /index.php.
        root  /usr/local/www/apache24/data/Sibermas2026/apps/api/public;
        index index.php;

        # --- Security headers (re-asserted at edge) -------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

        # --- Next.js static files (dilayani nginx langsung, bypass Node) ----
        location /_next/static/ {
            alias /usr/local/www/apache24/data/Sibermas2026/apps/web/.next/standalone/apps/web/.next/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # --- Next.js public assets (file yang dicopy ke standalone/public) --
        location /images/ {
            alias /usr/local/www/apache24/data/Sibermas2026/apps/web/.next/standalone/apps/web/public/images/;
            expires 7d;
        }

        # Catch-all favicon / robots / manifest dari Next.js public
        location = /favicon.ico { alias /usr/local/www/apache24/data/Sibermas2026/apps/web/.next/standalone/apps/web/public/favicon.ico; access_log off; }
        location = /robots.txt  { alias /usr/local/www/apache24/data/Sibermas2026/apps/web/.next/standalone/apps/web/public/robots.txt; access_log off; }

        # --- Laravel API — semua path /api/* masuk ke index.php ------------
        # Rate limit ketat khusus endpoint auth (brute-force guard).
        location ~ ^/api/v1/auth/(login|forgot-password|reset-password)$ {
            limit_req zone=auth_limit burst=3 nodelay;
            try_files $uri /index.php?$query_string;
        }

        # Rate limit longgar untuk sisa API.
        location ^~ /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;
            try_files $uri /index.php?$query_string;
        }

        # PHP handler — dipakai oleh /index.php saat try_files meng-forward.
        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php84-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include /usr/local/etc/nginx/fastcgi_params;
            fastcgi_read_timeout 300;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }

        # --- Next.js (semua path selain /api/* dan static override) --------
        location / {
            limit_conn conn_limit 50;
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Security: blokir akses ke dotfile (kecuali .well-known untuk certbot)
        location ~ /\.(?!well-known).* {
            deny all;
        }

        access_log /var/log/nginx/sibermas-access.log main;
        error_log  /var/log/nginx/sibermas-error.log;
    }

    # --------------------------------------------------------------------------
    # HTTPS (port 443) — AKTIFKAN SETELAH CERTBOT.
    # Langkah aktifasi:
    #   1. Jalankan: certbot certonly --webroot \
    #        -w /usr/local/www/apache24/data/Sibermas2026/apps/api/public \
    #        -d sibermas.uinsaizu.ac.id --cert-name sibermas.uinsaizu.ac.id \
    #        -m admin@uinsaizu.ac.id --agree-tos -n
    #   2. Uncomment block di bawah.
    #   3. Ganti isi server port 80 di atas menjadi:
    #        return 301 https://$host$request_uri;
    #   4. Update .env dari http:// ke https:// + SESSION_SECURE_COOKIE=true.
    #   5. service nginx reload
    # --------------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name sibermas.uinsaizu.ac.id;
    #
    #     ssl_certificate     /usr/local/etc/letsencrypt/live/sibermas.uinsaizu.ac.id/fullchain.pem;
    #     ssl_certificate_key /usr/local/etc/letsencrypt/live/sibermas.uinsaizu.ac.id/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_stapling        on;
    #     ssl_stapling_verify on;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # ... (copy paste semua isi location blocks dari server port 80 di atas)
    # }
}
