name: Backend API

on:
  push:
    branches: [main, develop]
    paths: ['apps/api/**']
  pull_request:
    branches: [main, develop]
    paths: ['apps/api/**']
  workflow_dispatch:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: kkn_test
          POSTGRES_USER: kkn_test
          POSTGRES_PASSWORD: kkn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, mbstring, xml, curl, zip, gd, pcntl, intl, bcmath, sodium
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "DB_DATABASE=kkn_test" >> .env
          echo "DB_USERNAME=kkn_test" >> .env
          echo "DB_PASSWORD=kkn_test" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "MAIL_MAILER=array" >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run Pest tests
        run: php artisan test --no-coverage

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, mbstring, xml, curl, zip, gd, pcntl, intl, bcmath, sodium

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (static analysis)
        run: composer stan

      - name: Security audit
        run: composer audit
