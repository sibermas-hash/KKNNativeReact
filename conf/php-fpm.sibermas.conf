; SIBERMAS - PHP-FPM pool for simple FreeBSD single-server deploy.
; Deploy target: /usr/local/etc/php-fpm.d/sibermas.conf

[sibermas]
user = www
group = www

listen = /var/run/php-fpm.sock
listen.owner = www
listen.group = www
listen.mode = 0660

pm = dynamic
pm.max_children = 40
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 1000

request_terminate_timeout = 120
request_slowlog_timeout = 5
slowlog = /var/log/php-fpm-sibermas-slow.log

pm.status_path = /status
security.limit_extensions = .php .php84

env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp
