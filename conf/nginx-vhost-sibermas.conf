# SIBERMAS Nginx vhost include for FreeBSD.
#
# Deploy target:
#   /usr/local/etc/nginx/vhosts/sibermas.conf
#   (included by host nginx.conf via: include /usr/local/etc/nginx/vhosts/*.conf;)
#
# This file is a server block + upstreams only — it does NOT replace the
# host's global nginx.conf. The host must have its own http {}, events {},
# worker settings, and include directive.
#
# Routing model:
#   /api/*       -> Apache24 backend on 127.0.0.1:8080
#   /            -> Next.js standalone on 127.0.0.1:3000
#   /_next/*     -> static files served directly by Nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

upstream sibermas_api {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream sibermas_web {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 80;
    server_name __WEB_DOMAIN__;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    location ^~ /.well-known/acme-challenge/ {
        root __APP_DIR__/apps/api/public;
        default_type text/plain;
        allow all;
    }

    # SSE notifications
    location = /api/notifications/stream {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://sibermas_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 75s;
        proxy_send_timeout 30s;
    }

    location = /api {
        proxy_pass http://sibermas_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
    }

    location ^~ /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;
        proxy_pass http://sibermas_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_redirect off;
    }

    location /_next/static/ {
        alias __APP_DIR__/apps/web/.next/standalone/apps/web/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    location /images/ {
        alias __APP_DIR__/apps/web/.next/standalone/apps/web/public/images/;
        expires 7d;
    }

    location = /favicon.ico {
        alias __APP_DIR__/apps/web/.next/standalone/apps/web/public/favicon.ico;
        access_log off;
    }

    location = /robots.txt {
        alias __APP_DIR__/apps/web/.next/standalone/apps/web/public/robots.txt;
        access_log off;
    }

    location / {
        limit_conn conn_limit 50;
        proxy_pass http://sibermas_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/sibermas-access.log;
    error_log  /var/log/nginx/sibermas-error.log;
}
