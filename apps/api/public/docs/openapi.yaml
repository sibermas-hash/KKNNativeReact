openapi: 3.0.3
info:
  title: 'SIBERMAS API Documentation'
  description: "\n        <h1>SIBERMAS API Documentation</h1>\n        <p>\n        Sistem Informasi Bimbingan Pengabdian Masyarakat (SIBERMAS) REST API v1.\n        This documentation covers all available endpoints for KKN management at UIN Prof. K.H. Saifuddin Zuhri Purwokerto.\n        </p>\n        <h2>Authentication</h2>\n        <p>Most endpoints require authentication via Sanctum Bearer tokens. Use the `/api/v1/auth/login` endpoint to obtain your token.</p>\n        <h2>Rate Limiting</h2>\n        <p>API endpoints are rate-limited to prevent abuse. Exceeding limits will result in HTTP 429 (Too Many Requests) responses.</p>\n        <h2>Error Responses</h2>\n        <p>All error responses follow a standard format with <code>success: false</code>, error code, and message.</p>\n    "
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  -
    name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: null
security:
  -
    default: []
paths:
  /api/health:
    get:
      summary: ''
      operationId: getApiHealth
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: ok
                  timestamp: '2026-05-06T12:42:32+07:00'
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    example: '2026-05-06T12:42:32+07:00'
      tags:
        - Endpoints
  /api/ready:
