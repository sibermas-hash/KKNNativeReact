                example:
                  status: ready
                  timestamp: '2026-05-06T12:42:32+07:00'
                properties:
                  status:
                    type: string
                    example: ready
                  timestamp:
                    type: string
                    example: '2026-05-06T12:42:32+07:00'
      tags:
        - Endpoints
  /api/v1/public/home:
    get:
      summary: "GET /api/v1/public/home\nHome page data. No auth required."
      operationId: gETapiv1publichomeHomePageDataNoAuthRequired
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: OK
                  data:
                    featuredAnnouncements: []
                    featuredDownloads: []
                    stats:
                      students: 0
                      groups: 0
                      locations: 0
                    aboutContent:
                      visi: 'Menjadi Lembaga Penelitian dan Pengabdian kepada Masyarakat yang unggul dan kompetitif dalam pengembangan ilmu pengetahuan, teknologi, dan seni yang berbasis pada nilai-nilai moderasi Islam dan kearifan lokal.'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: OK
                  data:
                    type: object
                    properties:
                      featuredAnnouncements:
                        type: array
                        example: []
                      featuredDownloads:
                        type: array
                        example: []
                      stats:
                        type: object
                        properties:
                          students:
                            type: integer
                            example: 0
                          groups:
                            type: integer
                            example: 0
                          locations:
                            type: integer
                            example: 0
                      aboutContent:
                        type: object
                        properties:
                          visi:
                            type: string
                            example: 'Menjadi Lembaga Penelitian dan Pengabdian kepada Masyarakat yang unggul dan kompetitif dalam pengembangan ilmu pengetahuan, teknologi, dan seni yang berbasis pada nilai-nilai moderasi Islam dan kearifan lokal.'
      tags:
        - Endpoints
  /api/v1/public/announcements:
    get:
      summary: "GET /api/v1/public/announcements\nPublished announcements, paginated. No auth required."
      operationId: gETapiv1publicannouncementsPublishedAnnouncementsPaginatedNoAuthRequired
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: OK
                  data: []
                  meta:
                    current_page: 1
                    last_page: 1
                    per_page: 12
                    total: 0
                    from: null
                    to: null
                  links:
                    first: 'http://localhost:8000/api/v1/public/announcements?page=1'
                    last: 'http://localhost:8000/api/v1/public/announcements?page=1'
                    prev: null
                    next: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: OK
                  data:
                    type: array
                    example: []
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 12
                      total:
                        type: integer
                        example: 0
                      from:
                        type: string
                        example: null
                        nullable: true
                      to:
                        type: string
                        example: null
                        nullable: true
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: 'http://localhost:8000/api/v1/public/announcements?page=1'
                      last:
                        type: string
                        example: 'http://localhost:8000/api/v1/public/announcements?page=1'
                      prev:
                        type: string
                        example: null
                        nullable: true
                      next:
                        type: string
                        example: null
                        nullable: true
      tags:
        - Endpoints
