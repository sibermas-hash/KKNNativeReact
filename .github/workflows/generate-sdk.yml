name: Generate SDKs

on:
  push:
    paths:
      - 'openapi.yaml'
      - '.github/workflows/generate-sdk.yml'
  workflow_dispatch: {}

jobs:
  generate-typescript-sdk:
    name: Generate TypeScript SDK (typescript-axios)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SDK using openapi-generator Docker image
        run: |
          echo "Generating TypeScript Axios SDK"
          docker run --rm -v "${{ github.workspace }}:/local" openapitools/openapi-generator-cli:v6.6.0 generate \
            -i /local/openapi.yaml \
            -g typescript-axios \
            -o /local/sdks/typescript \
            --additional-properties=supportsES6=true,npmName=@kkn/sdk,withoutRuntimeChecks=true

      - name: Archive SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk
          path: sdks/typescript
