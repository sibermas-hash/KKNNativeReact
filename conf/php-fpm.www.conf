; SIBERMAS — PHP-FPM pool config (5000 concurrent users)
; Deploy: /usr/local/etc/php-fpm.d/www.conf
; Target: api jail. Start conservatively on 8 vCPU / 32 GiB RAM; increase only
; after measuring peak PHP-FPM RSS under import/export/PDF workloads.

[sibermas]
user = www
group = www

listen = /var/run/php-fpm.sock
listen.backlog = 1024
listen.owner = www
listen.group = www
listen.mode = 0660

pm = dynamic
pm.max_children = 120
pm.start_servers = 16
pm.min_spare_servers = 10
pm.max_spare_servers = 24
pm.max_requests = 1000

request_terminate_timeout = 120
request_slowlog_timeout = 5
slowlog = /var/log/php-fpm-slow.log

pm.status_path = /status

security.limit_extensions = .php .php84

; Environment
env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp
