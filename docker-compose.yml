services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "${INSTALL_DEV:-false}"
    container_name: kkn-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_KKN_HOST: postgres
      DB_KKN_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    networks:
      - kkn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: kkn-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8082}:80"
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - kkn-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: kkn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${DOCKER_DB_PORT:-5435}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kkn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kkn-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6391:6379"
    volumes:
      - redis-data:/data
    networks:
      - kkn-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "${INSTALL_DEV:-false}"
    container_name: kkn-queue
    restart: unless-stopped
    command: php artisan queue:work redis --queue=high,default,low --tries=3 --timeout=120
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_KKN_HOST: postgres
      DB_KKN_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    volumes:
      - ./:/var/www
      - /var/www/vendor
    networks:
      - kkn-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: kkn-mailpit
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - kkn-network

networks:
  kkn-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
