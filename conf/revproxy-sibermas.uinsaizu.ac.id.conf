# Public reverse-proxy vhost for sibermas.uinsaizu.ac.id.
# Deploy target on gateway: /usr/local/etc/nginx/vhosts/sibermas.uinsaizu.ac.id.conf
# Backend app server: 172.16.2.70:80 (HTTP only).

upstream backend_sibermas {
    server 172.16.2.70:80 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name sibermas.uinsaizu.ac.id;

    location ^~ /.well-known/acme-challenge/ {
        proxy_pass http://backend_sibermas;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen [::]:443 ssl;
    listen 443 ssl;
    http2 on;
    server_name sibermas.uinsaizu.ac.id;

    if ($bad_ua) { return 444; }
    if ($bad_method) { return 444; }
    if ($bad_query) { return 403; }
    if ($http_user_agent ~* "libredtail-http") { return 403; }
    if ($request_method !~ ^(GET|POST|HEAD|OPTIONS)$) { return 444; }

    location ~* "(?:/etc/passwd)" { deny all; }
    location ~ (\.\./|\%2e) { return 403; }
    location /cgi-bin { deny all; }

    location = /api/notifications/stream {
        proxy_pass http://backend_sibermas;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 75s;
        proxy_send_timeout 30s;
    }

    location = /api {
        proxy_pass http://backend_sibermas;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_redirect off;
        proxy_socket_keepalive on;
    }

    location ^~ /api/ {
        proxy_pass http://backend_sibermas;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Prefix /api;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffers 32 32k;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_socket_keepalive on;
    }

    location / {
        proxy_pass http://backend_sibermas;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_buffers 32 32k;
        proxy_buffer_size 64k;
        proxy_busy_buffers_size 128k;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_socket_keepalive on;
    }

    ssl_certificate /usr/local/etc/letsencrypt/live/sibermas.uinsaizu.ac.id/fullchain.pem;
    ssl_certificate_key /usr/local/etc/letsencrypt/live/sibermas.uinsaizu.ac.id/privkey.pem;
    include /usr/local/etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /usr/local/etc/letsencrypt/ssl-dhparams.pem;
}
