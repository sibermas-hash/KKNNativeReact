; SIBERMAS — Web Jail Supervisor (Next.js Cluster x4)
; Deploy: /usr/local/etc/supervisord.d/sibermas-web.conf
; Target: web jail, 4 instance (1 per CPU core)
;
; PORT env pakai prefix "30" + process_num → 3000, 3001, 3002, 3003.

[program:sibermas-web]
process_name=%(program_name)s_%(process_num)02d
command=/usr/local/bin/node /usr/local/www/sibermas/web/server.js
directory=/usr/local/www/sibermas/web
autostart=true
autorestart=true
user=www
numprocs=4
umask=002
environment=NODE_ENV="production",PORT="30%(process_num)02d",HOSTNAME="0.0.0.0",UMASK="0002"
redirect_stderr=true
stdout_logfile=/var/log/sibermas/web.log
stopwaitsecs=30
