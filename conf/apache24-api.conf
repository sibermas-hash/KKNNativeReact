# SIBERMAS Apache24 backend for Laravel API on FreeBSD.
#
# Deploy target:
#   /usr/local/etc/apache24/Includes/sibermas-api.conf
#
# This file is meant to be used behind Nginx. Apache must NOT listen on
# public 80/443 for this profile; the deploy script disables the default
# `Listen 80` line in httpd.conf and this include binds only 127.0.0.1:8080.
#
# Required Apache modules:
#   mod_rewrite, mod_proxy, mod_proxy_fcgi, mod_headers, mod_setenvif

Listen 127.0.0.1:8080
ServerName 127.0.0.1:8080

<VirtualHost 127.0.0.1:8080>
    ServerName __WEB_DOMAIN__
    DocumentRoot "__APP_DIR__/apps/api/public"

    ErrorLog "/var/log/sibermas/apache-api-error.log"
    CustomLog "/var/log/sibermas/apache-api-access.log" combined

    Timeout 300
    ProxyTimeout 300
    LimitRequestBody 52428800

    # Preserve headers Laravel/Sanctum need when requests come through Nginx.
    SetEnvIfNoCase Authorization "^(.*)$" HTTP_AUTHORIZATION=$1
    SetEnvIfNoCase X-XSRF-Token "^(.*)$" HTTP_X_XSRF_TOKEN=$1

    <Directory "__APP_DIR__/apps/api/public">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Public assets generated by Laravel use APP_URL=/api, so asset('storage/x')
    # becomes /api/storage/x. Keep those paths as real files instead of sending
    # them into the Laravel router.
    Alias "/api/storage/" "__APP_DIR__/apps/api/public/storage/"
    Alias "/api/templates/" "__APP_DIR__/apps/api/public/templates/"
    Alias "/api/images/" "__APP_DIR__/apps/api/public/images/"
    Alias "/api/docs" "__APP_DIR__/apps/api/public/docs"
    Alias "/api/docs/" "__APP_DIR__/apps/api/public/docs/"
    Alias "/api/robots.txt" "__APP_DIR__/apps/api/public/robots.txt"

    <Directory "__APP_DIR__/apps/api/public/storage">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
    <Directory "__APP_DIR__/apps/api/public/templates">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
    <Directory "__APP_DIR__/apps/api/public/images">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
    <Directory "__APP_DIR__/apps/api/public/docs">
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/var/run/php-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    <FilesMatch "\.(env|log|ini|conf|sql|sqlite|bak)$">
        Require all denied
    </FilesMatch>
</VirtualHost>
